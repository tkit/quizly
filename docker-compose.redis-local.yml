services:
  redis:
    image: redis:7-alpine
    container_name: quizly-redis-local
    ports:
      - "6379:6379"

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    container_name: quizly-srh-local
    depends_on:
      - redis
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: quizly-dev-token
      SRH_CONNECTION_STRING: redis://redis:6379
