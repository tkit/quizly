name: Cloudflare Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      target:
        description: "Cloudflare Worker environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - "staging"
          - "production"
      deploy:
        description: "Deploy to the selected Cloudflare Worker"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  staging:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Staging
    concurrency:
      group: cloudflare-staging
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run lint

      - name: Type check
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run typecheck

      - name: Build OpenNext Worker
        run: npm run cf:build:staging
        env:
          NEXT_PUBLIC_SITE_URL: https://quizly-staging.stdy.workers.dev
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"

      - name: Check Cloudflare deploy secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured in the Staging environment; skipping staging deploy."
          fi

      - name: Deploy staging Worker
        if: ${{ (github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')) && steps.cloudflare-secrets.outputs.ready == 'true' }}
        run: npm run cf:deploy:staging:built
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://quizly-staging.stdy.workers.dev
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"

  production:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Production
    concurrency:
      group: cloudflare-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run lint

      - name: Type check
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run typecheck

      - name: Build OpenNext Worker
        run: npm run cf:build:production
        env:
          NEXT_PUBLIC_SITE_URL: https://quizly.stdy.workers.dev
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"

      - name: Check Cloudflare deploy secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured in the Production environment; skipping production deploy."
          fi

      - name: Deploy production Worker
        if: ${{ (github.event_name == 'workflow_run' || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')) && steps.cloudflare-secrets.outputs.ready == 'true' }}
        run: npm run cf:deploy:production:built
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://quizly.stdy.workers.dev
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"
