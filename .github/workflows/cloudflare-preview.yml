name: Cloudflare Preview

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to the Cloudflare preview Worker"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: cloudflare-preview
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Preview
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Check Clerk environment
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is not configured in the Preview environment."
            exit 1
          fi

          if [ -z "$CLERK_SECRET_KEY" ]; then
            echo "CLERK_SECRET_KEY is not configured in the Preview environment."
            exit 1
          fi

      - name: Build OpenNext Worker
        run: npm run cf:build:staging
        env:
          NEXT_PUBLIC_SITE_URL: https://quizly.stdy.workers.dev
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"

      - name: Check Cloudflare deploy secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; skipping deploy."
          fi

      - name: Deploy preview Worker
        if: inputs.deploy == 'true' && steps.cloudflare-secrets.outputs.ready == 'true'
        run: npm run cf:deploy-built:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://quizly.stdy.workers.dev
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_AUTH_MODE: production
          NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT: "false"
