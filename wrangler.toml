"$schema" = "./node_modules/wrangler/config-schema.json"
main = ".open-next/worker.js"
name = "quizly"
compatibility_date = "2026-04-25"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true
preview_urls = false
upload_source_maps = true

[observability]

[observability.logs]
enabled = true
invocation_logs = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
NEXT_PUBLIC_AUTH_MODE = "production"
NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT = "false"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "quizly"

[[r2_buckets]]
binding = "QUESTION_IMAGES"
bucket_name = "quizly-question-images"
preview_bucket_name = "quizly-question-images-preview"

[env.staging]
name = "quizly"
workers_dev = true
preview_urls = true
upload_source_maps = true

[env.staging.observability]

[env.staging.observability.logs]
enabled = true
invocation_logs = true

[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[env.staging.vars]
NEXT_PUBLIC_SITE_URL = "https://quizly.stdy.workers.dev"
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_c3VwcmVtZS11bmljb3JuLTAuY2xlcmsuYWNjb3VudHMuZGV2JA"
NEXT_PUBLIC_AUTH_MODE = "production"
NEXT_PUBLIC_ENABLE_DEV_AUTH_SHORTCUT = "false"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/"

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "quizly"

[[env.staging.r2_buckets]]
binding = "QUESTION_IMAGES"
bucket_name = "quizly-question-images-staging"
preview_bucket_name = "quizly-question-images-preview"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "quizly-staging"
database_id = "d7c8d446-c50b-4a01-9cb5-9faa2e347f86"
migrations_dir = "d1/migrations"
